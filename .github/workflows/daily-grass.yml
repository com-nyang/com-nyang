name: Daily Grass

on:
  schedule:
    - cron: "0 0 * * *"  # 매일 KST 09:00 (UTC 00:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random commits
        run: |
          git config user.name "com_nyang"
          git config user.email "luke@pabilica.com"

          COUNT=$(( RANDOM % 11 + 1 ))  # 1~11 랜덤
          echo "Today's commit count: $COUNT"

          for i in $(seq 1 $COUNT); do
            echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') [$i/$COUNT]" > .activity
            git add .activity
            git commit -m "chore: daily commit ($i/$COUNT)"
            sleep 1
          done

          git push
